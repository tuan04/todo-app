server:
    port: 8000

spring:
    application:
        name: todo-app

    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:todo_db}
        username: ${DB_USER:postgres}
        password: ${DB_PASSWORD:123456}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true

app:
    cors:
        allowed-origin: ${FE_URL:http://localhost:5173}